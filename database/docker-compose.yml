version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: kukkut_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-kukkut_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_this_password_123}
      POSTGRES_DB: ${DB_NAME:-kukkutraksha_db}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - kukkut_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kukkut_admin} -d ${DB_NAME:-kukkutraksha_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management (comment out in production)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kukkut_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@kukkutraksha.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - kukkut_network
    depends_on:
      - timescaledb

volumes:
  timescale_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  kukkut_network:
    driver: bridge
